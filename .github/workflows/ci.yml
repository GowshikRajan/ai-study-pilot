name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run linter (flake8)
        run: |
          flake8 backend/ tests/ --max-line-length=120

      - name: Run unit tests
        env:
          GEMINI_API_KEY: "dummy-key-for-ci"
          MONGO_URI: "mongodb://localhost:27017/testdb"
        run: |
          pytest tests/ -v --tb=short

      - name: Build Docker image
        run: |
          docker build -t ai-study-pilot:test .

      - name: Smoke test — start container and verify /health
        run: |
          docker run -d -p 8000:8000 \
            -e GEMINI_API_KEY="dummy-key-for-smoke" \
            -e MONGO_URI="mongodb://localhost:27017/testdb" \
            --name smoke-test \
            ai-study-pilot:test
          echo "Waiting 8 seconds for the container to start..."
          sleep 8
          echo "Calling /health endpoint..."
          curl --fail http://localhost:8000/health || \
            (echo "Health check failed. Container logs:" && docker logs smoke-test && exit 1)
          echo "Health check passed!"
          docker stop smoke-test
          docker rm smoke-test